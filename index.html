<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/svg+xml" href="/vite.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Friends</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}
			:root {
				overflow: hidden;
			}
			#map {
				position: absolute;
				width: 100vw;
				height: 100vh;
				top: 0;
				left: 0;
			}
			button {
				position: absolute;
				z-index: 99;
				font-size: 2.5rem;
				cursor: pointer;
				bottom: 1rem;
				left: 1rem;
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 0;
				width: 5rem;
				height: 5rem;
				border: none;
				background: darkslategrey;
				border-radius: 50%;
			}
			button:hover {
				background: #1e3a3a;
				transform: scale(1.05);
				transition: all 0.2s ease;
			}
			button:active {
				background: #0f1f1f;
				transform: scale(0.95);
				box-shadow: 
					inset 0 4px 8px rgba(0, 0, 0, 0.5),
					0 0 20px rgba(0, 255, 150, 0.3),
					0 0 40px rgba(0, 255, 150, 0.1);
				transition: all 0.1s ease;
			}
			button:active svg path {
				fill: #00ff96;
				filter: drop-shadow(0 0 5px rgba(0, 255, 150, 0.6));
			}
			#location-info {
				position: absolute;
				top: 1rem;
				right: 1rem;
				z-index: 99;
				background: rgba(0, 0, 0, 0.85);
				color: white;
				padding: 1rem;
				border-radius: 8px;
				font-family: 'Courier New', monospace;
				font-size: 0.9rem;
				line-height: 1.4;
				min-width: 200px;
				backdrop-filter: blur(10px);
			}
			#location-info div {
				margin-bottom: 0.5rem;
			}
			#location-info div:last-child {
				margin-bottom: 0;
			}
		</style>
	</head>
	<body>
		<div id="map"></div>

		<button>
			<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
				<path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="ivory"/>
			</svg>
		</button>
		<div id="location-info" style="display: none;">
			<div id="longitude">Lon: ---</div>
			<div id="latitude">Lat: ---</div>
			<div id="speed">Speed: ---</div>
		</div>
		<script type="module" src="/src/main.js"></script>
	</body>
</html>
